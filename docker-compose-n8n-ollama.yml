services:
  n8n:
    image: n8nio/n8n:latest
    container_name: soclab-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - TZ=Europe/Brussels
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - soc

  ollama:
    image: ollama/ollama:latest
    container_name: soclab-ollama
    restart: always
    ports:
      - "11434:11434"
    environment:
      - TZ=Europe/Brussels
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - soc

volumes:
  n8n_data:
  ollama_data:

networks:
  soc:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.23.0.0/16
    driver_opts:
      com.docker.network.bridge.name: br_soc
