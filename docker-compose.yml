services:
 ####### Zeek  #######
  zeek:
    image: zeek/zeek:lts
    network_mode: host
    volumes:
      - ./data/zeek/logs:/logs
    command: /bin/bash -c "cd /logs && zeek -C -i br_soc"
  ####### Suricata #######
  suricata:
    build:
      context: suricata/.
    network_mode: host
    cap_add:
     - NET_ADMIN
     - NET_RAW
    volumes:
      - ./config/suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - ./data/suricata/rules:/var/lib/suricata/rules
      - ./data/suricata/logs:/var/log/suricata/
    command: /bin/bash -c "suricata-update && suricata -c /etc/suricata/suricata.yaml -i br_soc && tail -f /var/log/cron.log"
 ####### Apps #######
  server-app:
    build:
      context: ./server-app/.
    networks:
      - soc
    ports:
      - "3001:80"
    environment:
      RESET_ACESS_METRIC: "900000"
  curl:
    build:
      context: ./curl/.
    networks:
      - soc
    depends_on:
      - server-app
    entrypoint: /bin/sh
    command: -c "
      while true; do
        curl -s http://server-app/ > /dev/null;
        sleep 5;
      done
    "
 ####### Maildev #######
  maildev:
    image: maildev/maildev
    restart: always
    networks:
      soc:
    environment:
      - TZ=Europe/Paris
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=25
    ports:
      - "1080:1080"
 ####### Caldera #######
  caldera:
    image: ghcr.io/mitre/caldera
    restart: no
    networks:
      soc:
    ports:
      - "8022:8022"
      - "8888:8888"
      - "8853:8853"
      - "7010:7010"
      - "7011:7011"
      - "7012:7012"
    volumes:
      - ./caldera/config/local.yml:/usr/src/app/conf/local.yml
      - ./caldera/config/ssh_keys:/ssh_keys
networks:
  soc:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.23.0.0/16
    driver_opts:
      com.docker.network.bridge.name: br_soc
